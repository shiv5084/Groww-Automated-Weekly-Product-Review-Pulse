services:
  - type: web
    name: groww-pulse-api
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn src.phase6_api.app:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GROQ_API_KEY
        sync: false
      - key: MCP_SERVER_URL
        sync: false
      - key: GOOGLE_MASTER_DOC_ID
        sync: false
      - key: PULSE_EMAIL_RECIPIENT
        sync: false
      - key: FRONTEND_URL
        sync: false
