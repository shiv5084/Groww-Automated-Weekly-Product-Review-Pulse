[pytest]
# =============================================================================
# pytest configuration for Groww Automated Weekly Product Review Pulse
# =============================================================================

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output verbosity
addopts =
    --verbose
    --tb=short
    --strict-markers
    --cov=src
    --cov-report=term-missing
    --cov-fail-under=70

# Async test support (for Playwright scraper tests)
asyncio_mode = auto

# Custom markers
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (may require network or credentials)
    slow: Tests that take more than 5 seconds to run
