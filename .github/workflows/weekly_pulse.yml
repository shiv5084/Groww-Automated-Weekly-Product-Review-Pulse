name: Groww - Weekly Product Review Pulse

on:
  schedule:
    # Trigger weekly on Monday at 9:20 AM IST (03:50 UTC)
    - cron: '50 3 * * 1'
  workflow_dispatch:
    inputs:
      weeks:
        description: 'Number of weeks to analyze'
        required: false
        default: '12'
      scrape:
        description: 'Scrape fresh reviews?'
        type: boolean
        default: true

jobs:
  run-pipeline:
    name: Run Weekly Review Pulse
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        env:
          # Secrets (Set these in GitHub Repo Settings -> Secrets and variables -> Actions -> Secrets)
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          
          # Variables (Set these in GitHub Repo Settings -> Secrets and variables -> Actions -> Variables)
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'groq' }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'llama-3.3-70b-versatile' }}
          MCP_SERVER_URL: ${{ vars.MCP_SERVER_URL || 'https://mcp-server-production-5084.up.railway.app' }}
          GOOGLE_MASTER_DOC_ID: ${{ vars.GOOGLE_MASTER_DOC_ID }}
          PULSE_EMAIL_RECIPIENT: ${{ vars.PULSE_EMAIL_RECIPIENT }}
          PULSE_EMAIL_SUBJECT_PREFIX: ${{ vars.PULSE_EMAIL_SUBJECT_PREFIX || 'Groww Weekly Pulse' }}
          
          # Pipeline defaults
          REVIEW_WEEKS: ${{ github.event.inputs.weeks || vars.REVIEW_WEEKS || '12' }}
        run: |
          # Determine if we should scrape
          SCRAPE_FLAG=""
          if [[ "${{ github.event.inputs.scrape }}" == "true" || "${{ github.event_name }}" == "schedule" ]]; then
            SCRAPE_FLAG="--scrape"
          fi
          
          echo "Running pipeline with weeks=${REVIEW_WEEKS} ${SCRAPE_FLAG}"
          
          # Execute the LangGraph orchestrator
          python src/main.py ${SCRAPE_FLAG} --weeks ${REVIEW_WEEKS}

      - name: Commit and push updated notes output for Render
        if: success()
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add output/notes/
          git commit -m "chore: update weekly pulse notes for Render [skip ci]" || echo "No changes to commit"
          git push

      - name: Upload Pulse Outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pulse-note-${{ github.run_id }}
          path: |
            output/notes/
            output/logs/
          retention-days: 7

      - name: Pipeline Status Notification
        if: always()
        run: |
          echo "## Groww Weekly Pulse - Pipeline Report" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "###  Status: SUCCESS" >> $GITHUB_STEP_SUMMARY
            echo "The weekly review pulse has been successfully generated, quality-checked, and published." >> $GITHUB_STEP_SUMMARY
            echo "#### Highlights:" >> $GITHUB_STEP_SUMMARY
            echo "- **Artifacts**: Pulse notes (MD, TXT, HTML) are available in the artifacts section." >> $GITHUB_STEP_SUMMARY
            echo "- **Publishing**: Google Doc updated and Gmail draft created (see publish logs)." >> $GITHUB_STEP_SUMMARY
          else
            echo "###  Status: FAILED" >> $GITHUB_STEP_SUMMARY
            echo "The pipeline encountered an error during execution. Please check the 'Run pipeline' logs for details." >> $GITHUB_STEP_SUMMARY
            echo "#### Troubleshooting:" >> $GITHUB_STEP_SUMMARY
            echo "- Verify `GROQ_API_KEY` is valid and not rate-limited." >> $GITHUB_STEP_SUMMARY
            echo "- Ensure the MCP server at `${{ vars.MCP_SERVER_URL }}` is reachable." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View Full Run Details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
